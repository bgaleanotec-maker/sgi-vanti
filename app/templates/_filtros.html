<div class="bg-white shadow-sm ring-1 ring-gray-900/5 sm:rounded-xl mb-6" x-data="{ open: false }">
    <div class="px-4 py-4 sm:px-6 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition-colors rounded-t-xl"
        @click="open = !open">
        <h3 class="text-base font-semibold leading-6 text-gray-900 flex items-center gap-2">
            <div class="h-8 w-8 rounded-lg bg-brand-50 flex items-center justify-center text-brand-600">
                <i class="bi bi-funnel-fill"></i>
            </div>
            Filtros de Búsqueda
        </h3>
        <i class="bi bi-chevron-down text-gray-400 transition-transform duration-200"
            :class="{ 'rotate-180': open }"></i>
    </div>
    <div x-show="open" x-collapse>
        <div class="border-t border-gray-200 px-4 py-5 sm:px-6 bg-gray-50/50">
            <form method="GET" action="" class="grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-4">
                <div>
                    <label for="estado_tarea" class="block text-sm font-semibold leading-6 text-gray-900">Estado</label>
                    <div class="mt-2">
                        <select id="estado_tarea" name="estado_tarea"
                            class="block w-full rounded-md border-0 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                            <option value="">Todos</option>
                            <option value="pendiente" {% if filtros.estado_tarea=='pendiente' %}selected{% endif %}>
                                Pendiente</option>
                            <option value="devuelta" {% if filtros.estado_tarea=='devuelta' %}selected{% endif %}>
                                Devuelta</option>
                            <option value="gestionado" {% if filtros.estado_tarea=='gestionado' %}selected{% endif %}>
                                Gestionado</option>
                            <option value="cerrada" {% if filtros.estado_tarea=='cerrada' %}selected{% endif %}>Cerrada
                            </option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="cuenta_contrato" class="block text-sm font-semibold leading-6 text-gray-900">Cuenta
                        Contrato</label>
                    <div class="mt-2">
                        <input type="text" name="cuenta_contrato" id="cuenta_contrato"
                            value="{{ filtros.cuenta_contrato or '' }}"
                            class="block w-full rounded-md border-0 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6"
                            placeholder="Buscar...">
                    </div>
                </div>

                <div>
                    <label for="orden" class="block text-sm font-semibold leading-6 text-gray-900">Orden</label>
                    <div class="mt-2">
                        <input type="text" name="orden" id="orden" value="{{ filtros.orden or '' }}"
                            class="block w-full rounded-md border-0 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6"
                            placeholder="Buscar...">
                    </div>
                </div>

                {% if current_user.rol == 'admin' %}
                <div>
                    <label for="bp_firma"
                        class="block text-sm font-semibold leading-6 text-gray-900">Contratista</label>
                    <div class="mt-2">
                        <input type="text" name="bp_firma" id="bp_firma" value="{{ filtros.bp_firma or '' }}"
                            class="block w-full rounded-md border-0 py-2 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6"
                            placeholder="Buscar...">
                    </div>
                </div>
                {% endif %}

                <div class="sm:col-span-4 flex justify-end gap-3 pt-2">
                    <a href="{{ request.path }}"
                        class="rounded-md bg-white px-3.5 py-2.5 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Limpiar</a>
                    <button type="submit"
                        class="rounded-md bg-brand-600 px-3.5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-600">
                        <i class="bi bi-search mr-2"></i> Filtrar Resultados
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
