{% extends "base.html" %}

{% block content %}
<div class="mx-auto max-w-2xl space-y-8">
    <!-- Header with Gradient -->
    <div class="relative overflow-hidden rounded-2xl bg-gradient-to-r from-brand-600 to-blue-600 px-6 py-8 shadow-xl">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10">
        </div>
        <div class="relative z-10">
            <h2 class="text-2xl font-bold text-white sm:text-3xl">Editar Usuario</h2>
            <p class="mt-2 text-brand-100">Modificando datos para: <strong>{{ user.username }}</strong></p>
        </div>
    </div>

    <div class="bg-white shadow-sm ring-1 ring-gray-900/5 sm:rounded-xl overflow-hidden">
        <div class="px-4 py-6 sm:px-6 border-b border-gray-200 bg-gray-50 rounded-t-xl">
            <h3 class="text-base font-semibold leading-6 text-gray-900">Información del Usuario</h3>
        </div>
        <div class="px-4 py-6 sm:px-6">
            <form method="POST" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium leading-6 text-gray-900">Correo
                        Electrónico</label>
                    <div class="mt-2">
                        <input type="email" name="email" id="email" value="{{ user.email or '' }}"
                            class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                    </div>
                </div>

                <div>
                    <label for="rol" class="block text-sm font-medium leading-6 text-gray-900">Rol</label>
                    <div class="mt-2">
                        <select id="rol" name="rol"
                            class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                            <option value="admin" {% if user.rol=='admin' %}selected{% endif %}>Administrador</option>
                            <option value="contratista" {% if user.rol=='contratista' %}selected{% endif %}>Contratista
                            </option>
                            <option value="ejecutivo" {% if user.rol=='ejecutivo' %}selected{% endif %}>Ejecutivo
                            </option>
                        </select>
                    </div>
                </div>

                <div>
                    <label for="bp_firma" class="block text-sm font-medium leading-6 text-gray-900">BP Firma (ID de
                        Contratista)</label>
                    <div class="mt-2">
                        <input type="text" name="bp_firma" id="bp_firma" value="{{ user.bp_firma or '' }}"
                            class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6">
                    </div>
                    <p class="mt-2 text-sm text-gray-500">Esencial para asociar tareas a contratistas.</p>
                </div>

                <div>
                    <label for="celular" class="block text-sm font-medium leading-6 text-gray-900">Celular
                        (WhatsApp)</label>
                    <div class="mt-2">
                        <input type="text" name="celular" id="celular" value="{{ user.celular or '' }}"
                            class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6"
                            placeholder="573001234567">
                    </div>
                </div>

                <div class="flex items-center justify-end gap-x-6 border-t border-gray-200 pt-6">
                    <a href="{{ url_for('admin.usuarios') }}"
                        class="text-sm font-semibold leading-6 text-gray-900">Cancelar</a>
                    <button type="submit"
                        class="rounded-md bg-brand-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-brand-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-600">Guardar
                        Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
