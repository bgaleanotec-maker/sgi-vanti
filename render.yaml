services:
  - type: web
    name: sgi-vanti
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sgi-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: sgi-db
    plan: free
    databaseName: sgi_vanti_db
    user: sgi_admin
